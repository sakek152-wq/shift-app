<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>シフトアプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: sans-serif; padding: 15px; background: #f5f5f5; }
    .day { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
    input, button { width: 100%; padding: 12px; margin-top: 5px; font-size: 16px; border-radius: 8px; }
    .add { background: #4CAF50; color: white; }
    .rest { background: #ccc; }
    .main-btn { background: #007aff; color: white; margin-top: 20px; }
  </style>
</head>
<body>

<h2>週間シフト</h2>

<input type="date" id="startDate" onchange="saveData()">

<div id="week"></div>

<button class="main-btn" onclick="generateICS()">カレンダー作成</button>

<script>
const days = ["月","火","水","木","金","土","日"];
let shifts = [];

// UI生成
function createWeekUI() {
  const container = document.getElementById("week");
  container.innerHTML = "";

  days.forEach((d, i) => {
    const div = document.createElement("div");
    div.className = "day";

    div.innerHTML = `
      <h3>${d}</h3>
      <input type="time" id="start${i}"onclick="resetMinutes(this)">
      <input type="time" id="end${i}"onclick="resetMinutes(this)" >
      <button class="add" onclick="setShift(${i})">追加</button>
      <button class="rest" onclick="setRest(${i})">休み</button>
      <div id="result${i}"></div>
    `;

    container.appendChild(div);
  });
}// シフト追加

function setShift(index) {

  const startDate = document.getElementById("startDate").value;

  if (!startDate) {

    alert("開始日を選んで");

    return;

  }

  const start = document.getElementById(`start${index}`).value;

  const end = document.getElementById(`end${index}`).value;

  if (!start || !end) {

    alert("時間を入力して");

    return;

  }

  const base = new Date(startDate);

  base.setDate(base.getDate() + index);

  const yyyy = base.getFullYear();

  const mm = String(base.getMonth()+1).padStart(2,"0");

  const dd = String(base.getDate()).padStart(2,"0");

  const date = `${yyyy}-${mm}-${dd}`;

  shifts[index] = { date, start, end };

  document.getElementById(`result${index}`).innerText =

    `${start}-${end}`;

  saveData();

}

// 休み

function setRest(index) {

  shifts[index] = { rest: true };

  document.getElementById(`result${index}`).innerText = "休み";

  saveData();

}

// 保存

function saveData() {

  const data = {

    startDate: document.getElementById("startDate").value,

    shifts: shifts

  };

  localStorage.setItem("shiftData", JSON.stringify(data));

}

// 読み込み

function loadData() {

  const data = JSON.parse(localStorage.getItem("shiftData"));

  if (!data) return;

  document.getElementById("startDate").value = data.startDate || "";

  shifts = data.shifts || [];

  shifts.forEach((s, i) => {

    if (!s) return;

    if (s.rest) {

      document.getElementById(`result${i}`).innerText = "休み";

    } else {

      document.getElementById(`start${i}`).value = s.start;

      document.getElementById(`end${i}`).value = s.end;

      document.getElementById(`result${i}`).innerText =

        `${s.start}-${s.end}`;

    }

  });

}// カレンダー生成

function generateICS() {

  let events = "";

  shifts.forEach(s => {

    if (!s || s.rest) return;

    const d = s.date.replaceAll("-", "");

    const start = s.start.replace(":", "");

    const end = s.end.replace(":", "");

    events += `

BEGIN:VEVENT

SUMMARY:バイト

DTSTART:${d}T${start}00

DTEND:${d}T${end}00

END:VEVENT

`;

  });

  const ics = `

BEGIN:VCALENDAR

VERSION:2.0

${events}

END:VCALENDAR

`;

  const blob = new Blob([ics], { type: "text/calendar" });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = url;

  a.download = "shift.ics";

  a.click();

}

// 初期化

createWeekUI();

loadData();

</script>

</body>

</html>
